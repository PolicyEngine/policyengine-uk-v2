# UK Tax-Benefit Parameters for Fiscal Year 1994/95
# Sources: Finance Act 1993, SI 1994/542 (Benefits Up-rating Order), HMRC Table A.1/A.2/A.4A

fiscal_year: "1994/95"

income_tax:
  personal_allowance: 3445.0
  pa_taper_threshold: 100000000.0  # No PA taper before 2010/11
  pa_taper_rate: 0.0
  uk_brackets:
    - { rate: 0.20, threshold: 0.0 }
    - { rate: 0.25, threshold: 3000.0 }
    - { rate: 0.40, threshold: 23700.0 }
  scottish_brackets:  # Scotland used UK rates until 2017/18
    - { rate: 0.20, threshold: 0.0 }
    - { rate: 0.25, threshold: 3000.0 }
    - { rate: 0.40, threshold: 23700.0 }
  dividend_allowance: 0.0  # Did not exist before 2016/17
  dividend_basic_rate: 0.2
  dividend_higher_rate: 0.25
  dividend_additional_rate: 0.0
  savings_starter_rate_band: 0.0  # Did not exist before 2015/16

national_insurance:
  primary_threshold_annual: 2964.0   # 57/week
  upper_earnings_limit_annual: 22360.0  # 430/week
  main_rate: 0.1
  additional_rate: 0.0  # No additional rate above UEL until 2003/04
  secondary_threshold_annual: 2964.0   # 57/week
  employer_rate: 0.102
  class2_flat_rate_weekly: 5.65
  class2_small_profits_threshold: 3200.0
  class4_lower_profits_limit: 6490.0
  class4_upper_profits_limit: 22360.0
  class4_main_rate: 0.073
  class4_additional_rate: 0.0

universal_credit:  # Did not exist until 2013/14
  standard_allowance_single_under25: 0.0
  standard_allowance_single_over25: 0.0
  standard_allowance_couple_under25: 0.0
  standard_allowance_couple_over25: 0.0
  child_element_first: 0.0
  child_element_subsequent: 0.0
  disabled_child_lower: 0.0
  disabled_child_higher: 0.0
  lcwra_element: 0.0
  carer_element: 0.0
  taper_rate: 0.0
  work_allowance_higher: 0.0
  work_allowance_lower: 0.0
  child_limit: 0

child_benefit:
  eldest_weekly: 10.2
  additional_weekly: 8.25
  hicbc_threshold: 999999.0  # HICBC did not exist before 2013/14
  hicbc_taper_end: 999999.0

state_pension:
  new_state_pension_weekly: 0.0  # Did not exist until 2016/17

pension_credit:  # Did not exist until 2003/04 (MIG predecessor not modelled)
  standard_minimum_single: 0.0
  standard_minimum_couple: 0.0
  savings_credit_threshold_single: 0.0
  savings_credit_threshold_couple: 0.0

benefit_cap:  # Did not exist until 2013/14
  single_london: 0.0
  single_outside_london: 0.0
  non_single_london: 0.0
  non_single_outside_london: 0.0
  earnings_exemption_threshold: 0.0

housing_benefit:
  withdrawal_rate: 0.65
  personal_allowance_single_under25: 36.15
  personal_allowance_single_25_plus: 45.7
  personal_allowance_couple: 71.7
  child_allowance: 15.65
  family_premium: 10.05

tax_credits:
  # Family Credit (SI 1987/1973 Sch.4; SI 1994/542 Sch.2 & art.14(c))
  # FC taper rate: 70% (reg 46(2)); applicable amount: reg 47; min 16 hrs/wk
  wtc_basic_element: 2303.60       # Adult credit: £44.30/wk × 52
  wtc_couple_element: 0.0          # No separate couple element in FC
  wtc_lone_parent_element: 0.0     # No separate lone parent element in FC
  wtc_30_hour_element: 0.0         # 30-hour element not introduced until 1996/97
  ctc_child_element: 582.40        # Child under 11: £11.20/wk × 52
  ctc_family_element: 0.0          # Family element did not exist in FC
  ctc_disabled_child_element: 0.0  # No disabled child element in FC pre-2001
  ctc_severely_disabled_child_element: 0.0
  income_threshold: 3728.40        # Applicable amount: £71.70/wk × 52
  taper_rate: 0.70                 # FC taper rate: 70%
  wtc_min_hours_single: 16.0       # FC required 16 hours/wk
  wtc_min_hours_couple: 16.0

scottish_child_payment:  # Did not exist until 2021/22
  weekly_amount: 0.0
  max_age: 0.0

disability_premiums:
  # IS (General) Regs 1987 Sch.2 Pt.IV; uprated by SI 1994 uprating order
  disability_premium_single: 19.45
  disability_premium_couple: 27.8
  enhanced_disability_premium_single: 0.0  # Introduced April 2001
  enhanced_disability_premium_couple: 0.0
  severe_disability_premium: 34.3
  carer_premium: 12.4

income_related_benefits:
  esa_allowance_single_under25: 0.0  # ESA did not exist until 2008/09
  esa_allowance_single_25_plus: 0.0
  esa_allowance_couple: 0.0
  esa_wrag_component: 0.0
  esa_support_component: 0.0
  jsa_allowance_single_under25: 36.15
  jsa_allowance_single_25_plus: 45.7
  jsa_allowance_couple: 71.7
  carers_allowance_weekly: 34.5
  ca_earnings_disregard_weekly: 50.0
  ca_min_hours_caring: 35.0
  ca_care_recipient_min_age: 16.0

uc_migration:
  housing_benefit: 0.0
  tax_credits: 0.0
  income_support: 0.0


vat:
  standard_rate: 0.175
  reduced_rate: 0.05
  zero_rate: 0.0

growth_factors:
