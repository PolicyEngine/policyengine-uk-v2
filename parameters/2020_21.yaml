# UK Tax-Benefit Parameters for Fiscal Year 2020/21
# Sources: Finance Act 2020, SI 2020/234 (Benefits Up-rating Order 2020)
# Major: COVID-19 temporary UC uplift (+£20/week = £86.67/month, reflected in standard allowances);
#        PA frozen at £12,500; Scottish 5-band structure continues;
#        Scottish Child Payment introduced (£10/week, under 6s, from Feb 2021)
# HMRC rates: gov.uk/guidance/rates-and-thresholds-for-employers-2020-to-2021
# DWP rates: gov.uk/government/publications/benefit-and-pension-rates-2020-to-2021

fiscal_year: "2020/21"

income_tax:
  personal_allowance: 12500.0       # Frozen; HMRC Table A1
  pa_taper_threshold: 100000.0
  pa_taper_rate: 0.5
  marriage_allowance_fraction: 0.10
  uk_brackets:
    - { rate: 0.20, threshold: 0.0 }
    - { rate: 0.40, threshold: 37500.0 }    # HMRC employer guidance 2020/21
    - { rate: 0.45, threshold: 150000.0 }
  scottish_brackets:
    - { rate: 0.19, threshold: 0.0 }        # Starter; HMRC employer guidance
    - { rate: 0.20, threshold: 2085.0 }     # Basic
    - { rate: 0.21, threshold: 12658.0 }    # Intermediate
    - { rate: 0.41, threshold: 30930.0 }    # Higher
    - { rate: 0.46, threshold: 150000.0 }   # Top
  dividend_allowance: 2000.0        # HMRC Table A1
  dividend_basic_rate: 0.075
  dividend_higher_rate: 0.325
  dividend_additional_rate: 0.381
  savings_starter_rate_band: 5000.0

national_insurance:
  primary_threshold_annual: 9500.0    # £183/week; HMRC employer guidance & Table A4
  upper_earnings_limit_annual: 50000.0  # £962/week; HMRC Table A4
  main_rate: 0.12
  additional_rate: 0.02
  secondary_threshold_annual: 8788.0  # £169/week; HMRC employer guidance
  employer_rate: 0.138
  class2_flat_rate_weekly: 3.05       # HMRC Table A4
  class2_small_profits_threshold: 6475.0  # HMRC Table A4
  class4_lower_profits_limit: 9500.0  # HMRC Table A4
  class4_upper_profits_limit: 50000.0 # HMRC Table A4
  class4_main_rate: 0.09
  class4_additional_rate: 0.02

universal_credit:
  # SI 2020/234; COVID uplift: standard allowances temporarily increased by £86.67/month
  # The rates shown include the COVID uplift effective from April 2020
  standard_allowance_single_under25: 342.72   # DWP 2020/21 rates (with COVID uplift)
  standard_allowance_single_over25: 409.89
  standard_allowance_couple_under25: 488.59
  standard_allowance_couple_over25: 594.04
  child_element_first: 281.25     # DWP 2020/21 rates
  child_element_subsequent: 235.83
  disabled_child_lower: 128.25    # DWP 2020/21 rates
  disabled_child_higher: 400.29
  lcwra_element: 341.92
  carer_element: 162.92
  taper_rate: 0.63
  work_allowance_higher: 512.0    # DWP 2020/21 rates
  work_allowance_lower: 292.0
  child_limit: 2

child_benefit:
  eldest_weekly: 21.05            # Uprated after freeze ended
  additional_weekly: 13.95
  hicbc_threshold: 50000.0
  hicbc_taper_end: 60000.0

state_pension:
  new_state_pension_weekly: 175.20  # DWP 2020/21 rates

pension_credit:
  standard_minimum_single: 173.75   # DWP 2020/21 rates
  standard_minimum_couple: 265.20
  savings_credit_threshold_single: 150.47
  savings_credit_threshold_couple: 239.17

benefit_cap:
  single_london: 15410.0
  single_outside_london: 13400.0
  non_single_london: 23000.0
  non_single_outside_london: 20000.0
  earnings_exemption_threshold: 7400.0

housing_benefit:
  withdrawal_rate: 0.65
  personal_allowance_single_under25: 58.90   # Uprated after freeze
  personal_allowance_single_25_plus: 74.35
  personal_allowance_couple: 116.80
  child_allowance: 68.27
  family_premium: 17.60

tax_credits:
  wtc_basic_element: 1995.0   # Uprated after 4-year freeze
  wtc_couple_element: 2045.0
  wtc_lone_parent_element: 2045.0
  wtc_30_hour_element: 825.0
  ctc_child_element: 2830.0
  ctc_family_element: 545.0
  ctc_disabled_child_element: 3415.0
  ctc_severely_disabled_child_element: 1385.0
  income_threshold: 6530.0
  taper_rate: 0.41
  wtc_min_hours_single: 30.0
  wtc_min_hours_couple: 24.0

scottish_child_payment:
  weekly_amount: 10.0   # Introduced Feb 2021, under-6s only
  max_age: 6.0

disability_premiums:
  disability_premium_single: 34.95
  disability_premium_couple: 49.80
  enhanced_disability_premium_single: 17.10
  enhanced_disability_premium_couple: 24.50
  severe_disability_premium: 66.95
  carer_premium: 37.50

income_related_benefits:
  esa_allowance_single_under25: 58.90   # Uprated after freeze
  esa_allowance_single_25_plus: 74.35
  esa_allowance_couple: 116.80
  esa_wrag_component: 29.55
  esa_support_component: 39.20
  jsa_allowance_single_under25: 58.90
  jsa_allowance_single_25_plus: 74.35
  jsa_allowance_couple: 116.80
  carers_allowance_weekly: 67.25
  ca_earnings_disregard_weekly: 128.0
  ca_min_hours_caring: 35.0
  ca_care_recipient_min_age: 16.0

vat:
  standard_rate: 0.20
  reduced_rate: 0.05
  zero_rate: 0.0

growth_factors:
  # OBR Economic and Fiscal Outlook, March 2026; council tax: MHCLG council tax levels 2026-27, Table 3 (England average Band D)
  # Rates are the year-on-year change entering FY 2020/21.
  cpi_rate: 0.00869                  # +0.869% CPI inflation, EFO Table 1.7
  gdp_deflator: 0.05700              # +5.700% GDP deflator, EFO Table 1.7
  earnings_growth: 0.01500           # +1.500% average weekly earnings growth, EFO Table 1.6
  gdp_pc_growth: -0.07134            # -7.134% nominal GDP per 16+ head, EFO Tables 1.4 (quarterly) + 1.6
  mixed_income_pc_growth: 0.00829    # +0.829% mixed income per 16+ head, EFO Table 1.6
  savings_interest_growth: -0.56922  # -56.922% deposit rate growth, EFO Table 1.9
  rent_growth: 0.01672               # +1.672% actual rents for housing, EFO Table 1.7
  population_growth: 0.00386         # +0.386% 16+ population, EFO Table 1.6
  council_tax_growth: 0.03900        # +3.900% England average Band D, MHCLG Table 3
