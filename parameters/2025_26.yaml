# UK Tax-Benefit Parameters for Fiscal Year 2025/26
# All values are annual unless noted. Monthly UC amounts are per assessment period.
# Sources: UK legislation via Lex API (legislation.gov.uk)

fiscal_year: "2025/26"

income_tax:
  # ITA 2007 s.35 — Personal allowance frozen at £12,570 since 2021/22
  # Citation: Income Tax Act 2007 c.3 s.35; frozen by Finance Act 2021 s.5
  personal_allowance: 12570.0
  # ITA 2007 s.35(2) — taper: £1 reduction per £2 above threshold
  pa_taper_threshold: 100000.0
  pa_taper_rate: 0.5

  # ITA 2007 s.10 — basic rate limit frozen at £37,700
  # Higher rate threshold = PA + basic rate limit = £50,270
  uk_brackets:
    - { rate: 0.20, threshold: 0.0 }       # Basic rate (ITA 2007 s.6(2))
    - { rate: 0.40, threshold: 37700.0 }    # Higher rate
    - { rate: 0.45, threshold: 125140.0 }   # Additional rate (Finance Act 2023)

  # Scottish rates set by Scottish Rate Resolution 2025/26
  # Scotland Act 1998 s.80C; Scottish Parliament resolution
  # Scottish rates set by Scottish Rate Resolution 2025/26
  # Scotland Act 1998 s.80C; Scottish Budget 2025-26
  scottish_brackets:
    - { rate: 0.19, threshold: 0.0 }       # Starter rate
    - { rate: 0.20, threshold: 2827.0 }    # Basic rate (was 2306 in 2024/25)
    - { rate: 0.21, threshold: 14921.0 }   # Intermediate rate (was 13991)
    - { rate: 0.42, threshold: 31092.0 }   # Higher rate (frozen)
    - { rate: 0.45, threshold: 62430.0 }   # Advanced rate (frozen)
    - { rate: 0.48, threshold: 125140.0 }  # Top rate

  # ITA 2007 s.8 — dividend rates
  dividend_allowance: 500.0
  dividend_basic_rate: 0.0875
  dividend_higher_rate: 0.3375
  dividend_additional_rate: 0.3935
  savings_starter_rate_band: 5000.0

national_insurance:
  # SSCBA 1992 s.5-6; SI 2025/288 (Contributions Regulations 2025)
  # Primary threshold: £125/week = £6,500/year (reg.10(a) — £125/week from 6 Apr 2025)
  # But NI primary threshold aligned to PA at £12,570 since 2022
  # Upper earnings limit: £967/week × 52 = £50,270
  primary_threshold_annual: 12570.0
  upper_earnings_limit_annual: 50270.0
  # Main rate reduced to 8% from 6 Jan 2024 (National Insurance Contributions
  # (Reduction in Rates) Act 2024 c.1)
  main_rate: 0.08
  additional_rate: 0.02
  # Class 2 abolished from 6 April 2024 (National Insurance Contributions Act 2024)
  class2_flat_rate_weekly: 0.0
  class2_small_profits_threshold: 0.0
  # Class 1 employer (secondary): SSCBA 1992 s.9; SI 2025/288
  # Secondary threshold reduced to £5,000/year from April 2025 (Autumn Budget 2024)
  # Employer rate increased to 15% from April 2025
  secondary_threshold_annual: 5000.0
  employer_rate: 0.15
  # Class 4 (self-employed): SSCBA 1992 s.15
  class4_lower_profits_limit: 12570.0
  class4_upper_profits_limit: 50270.0
  class4_main_rate: 0.06
  class4_additional_rate: 0.02

universal_credit:
  # UC Regs 2013 (SI 2013/376) reg.36, as amended by SI 2025/295 art.32
  # Monthly amounts (per assessment period)
  standard_allowance_single_under25: 316.98  # reg.36 table
  standard_allowance_single_over25: 400.14
  standard_allowance_couple_under25: 497.55
  standard_allowance_couple_over25: 628.10
  # Child element: reg.24, reg.36 table
  child_element_first: 339.00   # First child (monthly)
  child_element_subsequent: 292.81  # Each subsequent child (monthly)
  disabled_child_lower: 158.76
  disabled_child_higher: 495.87
  # LCWRA element: reg.36 table
  lcwra_element: 423.27
  # Carer element: reg.36 table
  carer_element: 201.68
  # reg.22 — taper rate 55%, work allowances
  # SI 2025/295 art.32: higher work allowance £684/month, lower £411/month
  taper_rate: 0.55
  work_allowance_higher: 684.0   # No housing costs (monthly)
  work_allowance_lower: 411.0    # With housing costs (monthly)
  child_limit: 2
  # Housing cost contributions: Sch.4 para.14(1) — £93.02/month

child_benefit:
  # Child Benefit (Rates) Regs 2006 (SI 2006/965) reg.2
  # As amended by SI 2025/292 art.2 (from 7 April 2025)
  eldest_weekly: 26.05
  additional_weekly: 17.25
  # HICBC: ITEPA 2003 s.681B-681H; threshold raised to £60k from 2024/25
  hicbc_threshold: 60000.0
  hicbc_taper_end: 80000.0

state_pension:
  # Pensions Act 2014 c.19 s.2-4; full rate set by SI 2025/295 art.6(1)
  # State Pension Regs 2015 reg.1A: £230.25/week from April 2025
  new_state_pension_weekly: 230.25
  # Old basic state pension: SSCBA 1992 Sch.4 Part I
  # SI 2025/295 art.4(2): £176.45/week (full rate Cat A with 30 qualifying years)

pension_credit:
  # State Pension Credit Regs 2002 (SI 2002/1792) reg.6
  # As amended by SI 2025/295 art.29
  standard_minimum_single: 227.10  # Weekly (reg.6(1)(b))
  standard_minimum_couple: 346.60  # Weekly (reg.6(1)(a))
  # Savings credit threshold: reg.7(2)
  savings_credit_threshold_single: 198.27
  savings_credit_threshold_couple: 314.34

benefit_cap:
  # Welfare Reform Act 2012 s.96; Benefit Cap (Housing Benefit and UC) Regs 2016
  # SI 2016/509 as amended. Rates frozen since 2016.
  single_london: 15410.0       # £296.35/week
  single_outside_london: 13400.0  # £257.69/week
  non_single_london: 23000.0   # £442.31/week
  non_single_outside_london: 20000.0  # £384.62/week
  earnings_exemption_threshold: 10152.0  # £846/month

housing_benefit:
  # Housing Benefit Regs 2006 (SI 2006/213)
  # Withdrawal rate: reg.70(1)(a) — 65%
  withdrawal_rate: 0.65
  # Applicable amount personal allowances (weekly): Sch.3
  personal_allowance_single_under25: 71.70
  personal_allowance_single_25_plus: 90.50
  personal_allowance_couple: 142.25
  child_allowance: 83.73
  family_premium: 18.53

tax_credits:
  # Tax Credits Act 2002; SI 2002/2005 (Working Tax Credit Regs)
  # SI 2002/2007 (Child Tax Credit Regs)
  # WTC elements (annual)
  wtc_basic_element: 2435.0
  wtc_couple_element: 2500.0
  wtc_lone_parent_element: 2500.0
  wtc_30_hour_element: 1015.0
  # CTC elements (annual)
  ctc_child_element: 3455.0
  ctc_family_element: 545.0
  ctc_disabled_child_element: 4170.0
  ctc_severely_disabled_child_element: 1680.0
  # Income thresholds and taper
  income_threshold: 7455.0
  taper_rate: 0.41
  # Minimum hours for WTC
  wtc_min_hours_single: 30.0
  wtc_min_hours_couple: 24.0


scottish_child_payment:
  # Social Security (Scotland) Act 2018; SSI 2020/351
  # £26.70/week from November 2024
  weekly_amount: 26.70
  max_age: 16.0

disability_premiums:
  # Income Support (General) Regs 1987 (SI 1987/1967) Sch.2, as amended.
  # Uprated by SI 2025/295 (Uprating Order 2025) art.14
  # Disability Premium: Sch.2 para.11(1)(a)
  disability_premium_single: 42.50
  disability_premium_couple: 60.60
  # Enhanced Disability Premium: Sch.2 para.13(1)
  enhanced_disability_premium_single: 27.90
  enhanced_disability_premium_couple: 39.85
  # Severe Disability Premium: Sch.2 para.14(1)
  severe_disability_premium: 81.50
  # Carer Premium: Sch.2 para.14D(1)
  carer_premium: 46.00

income_related_benefits:
  # ESA personal allowances: Employment and Support Allowance Regs 2008 (SI 2008/794) Sch.4
  # Uprated by SI 2025/295 art.18
  esa_allowance_single_under25: 71.70
  esa_allowance_single_25_plus: 90.50
  esa_allowance_couple: 142.25
  # ESA components: SI 2008/794 Sch.4 col.2; uprated by SI 2025/295 art.18
  esa_wrag_component: 35.95
  esa_support_component: 48.95
  # JSA allowances: Jobseeker's Allowance Regs 1996 (SI 1996/207) Sch.1
  # Uprated by SI 2025/295 art.16
  jsa_allowance_single_under25: 71.70
  jsa_allowance_single_25_plus: 90.50
  jsa_allowance_couple: 142.25
  # Carers Allowance: SSCBA 1992 s.70; SS (Carers Allowance) Regs 2002 (SI 2002/2690) reg.4
  # Uprated by SI 2025/295 art.12: £81.90/week
  carers_allowance_weekly: 81.90
  # CA earnings disregard: SI 2002/2690 reg.8; uprated by SI 2025/295 art.13: £151.00/week
  ca_earnings_disregard_weekly: 151.00
  # CA caring hours: SSCBA 1992 s.70(1)(b)
  ca_min_hours_caring: 35.0
  ca_care_recipient_min_age: 16.0

vat:
  # Value Added Tax Act 1994 c.23
  # Standard rate: s.2(1), 20% since 4 Jan 2011 (SI 2010/3025)
  # Reduced rate: s.29A / Sch.7A, 5% on domestic fuel & power
  # Zero rate: Sch.8 (food, children's clothing, books, public transport)
  standard_rate: 0.20
  reduced_rate: 0.05
  zero_rate: 0.0

fuel_duty:
  # Hydrocarbon Oil Duties Act 1979 s.6; SI 2022/269 (5p cut); extended to 2025/26
  # 52.95p/litre on unleaded petrol and diesel
  petrol_rate_per_litre: 0.5295
  diesel_rate_per_litre: 0.5295
  # Average pump prices (BEIS weekly fuel prices, Q1 2025/26 average)
  average_petrol_price_per_litre: 1.35
  average_diesel_price_per_litre: 1.40

alcohol_duty:
  # Alcoholic Liquor Duties Act 1979, reformed by Finance (No. 2) Act 2023 s.46-88
  # OBR 2025/26: £11.9bn revenue from ~£30bn household alcohol spending
  effective_rate: 0.40

tobacco_duty:
  # Tobacco Products Duty Act 1979; escalator RPI + 2% (Finance Act 2024)
  # OBR 2025/26: £8bn revenue from ~£11bn household tobacco spending
  effective_rate: 0.72

council_tax:
  # Local Government Finance Act 1992 s.1-5
  # DLUHC Council Tax levels statistics 2025/26: England average Band D = £2,280
  average_band_d: 2280.0

capital_gains_tax:
  # Taxation of Chargeable Gains Act 1992; Finance Act 2024 s.7 (rate increases)
  # AEA reduced to £3,000 from 2024/25 (Finance Act 2023 s.4)
  # Rates from 30 October 2024: basic 18%, higher 24% (residential already 18/24).
  annual_exempt_amount: 3000.0
  basic_rate: 0.18
  higher_rate: 0.24
  residential_surcharge: 0.0  # residential unified with non-residential from Apr 2025
  realisation_rate: 0.50

cgt_response:
  # Realisation behavioural response (PolicyEngine-UK capital_gains_behavioural_response).
  # Static baseline: elasticity 0 ⇒ no response. Reforms set elasticity (negative)
  # and baseline_rate (the pre-reform marginal rate) to activate.
  elasticity: 0.0
  baseline_rate: 0.0

pensions:
  # Finance Act 2004 Part 4. Annual allowance £60,000 from 2023/24 (FA 2023 s.18).
  # Tapered for adjusted income > £260,000, down to a £10,000 minimum (FA 2004 s.228ZA).
  annual_allowance: 60000.0
  annual_allowance_taper_threshold: 260000.0
  annual_allowance_taper_rate: 0.5  # £1 reduction per £2 over threshold
  annual_allowance_minimum: 10000.0
  relief_at_source: false  # default: net-pay treatment of reported contributions
  basic_rate: 0.20

stamp_duty:
  # SDLT — England + NI. Finance Act 2003 s.55, as amended; bands from 1 April 2025
  bands:
    - { rate: 0.0, threshold: 0 }
    - { rate: 0.02, threshold: 125001 }
    - { rate: 0.05, threshold: 250001 }
    - { rate: 0.10, threshold: 925001 }
    - { rate: 0.12, threshold: 1500001 }
  annual_purchase_probability: 0.043  # ~1/23 year average holding period

lbtt:
  # LBTT — Scotland's devolved replacement for SDLT. Land and Buildings Transaction
  # Tax (Tax Rates and Tax Bands) (Scotland) Order 2015 (SSI 2015/126), Schedule.
  # Residential primary-residence bands.
  bands:
    - { rate: 0.0,  threshold: 0 }
    - { rate: 0.02, threshold: 145001 }
    - { rate: 0.05, threshold: 250001 }
    - { rate: 0.10, threshold: 325001 }
    - { rate: 0.12, threshold: 750001 }
  annual_purchase_probability: 0.043

ltt:
  # LTT — Wales's devolved replacement for SDLT. Land Transaction Tax (Tax Bands
  # and Tax Rates) (Wales) Regulations 2018 (WSI 2018/128), Schedule.
  # Residential primary-residence bands.
  bands:
    - { rate: 0.0,   threshold: 0 }
    - { rate: 0.035, threshold: 180001 }
    - { rate: 0.05,  threshold: 250001 }
    - { rate: 0.075, threshold: 400001 }
    - { rate: 0.10,  threshold: 750001 }
    - { rate: 0.12,  threshold: 1500001 }
  annual_purchase_probability: 0.043

wealth_tax:
  # Hypothetical — no current UK legislation. Disabled by default.
  # Wealth Tax Commission (2020) proposed 1% above £10m.
  enabled: false
  threshold: 10000000.0
  rate: 0.01

dla:
  # Disability Living Allowance weekly rates from 7 April 2025.
  # SSCBA 1992 Sch.2 paras 2–3. Source: gov.uk/dla-rates.
  care_low_weekly:     29.20
  care_mid_weekly:     73.90
  care_high_weekly:   110.40
  mobility_low_weekly: 29.20
  mobility_high_weekly: 77.05

aa:
  # Attendance Allowance weekly rates from 7 April 2025.
  # SSCBA 1992 s.64. Source: gov.uk/attendance-allowance/what-youll-get.
  low_weekly:   73.90
  high_weekly: 110.40
pip:
  # Personal Independence Payment weekly rates from 7 April 2025.
  # Welfare Reform Act 2012 s.79 / SI 2013/377. Source: gov.uk/pip/what-youll-get.
  daily_living_standard_weekly: 73.90
  daily_living_enhanced_weekly: 110.40
  mobility_standard_weekly:     29.20
  mobility_enhanced_weekly:     77.05

lha:
  # Local Housing Allowance rates for 2025/26.
  # LHA was re-frozen in April 2025 at the 2024/25 reset rates.
  # 2024/25 rates: 30th percentile of private rents in each BRMA, reset from freeze.
  # Source: VOA list of rents (2019–2020 data), uprated to April 2024 using ONS Index of
  #   Private Housing Rental Prices (index: April 2020 = 109.0, April 2024 ≈ 125.0;
  #   uprate factor = 1.1468). Aggregated to GOR (region) as FRS suppresses BRMA identifiers.
  # Categories: [A=shared, B=1-bed, C=2-bed, D=3-bed, E=4+bed] — monthly amounts (£).
  # Row order: NE, NW, Yorkshire, E.Midlands, W.Midlands, E.ofEngland, London,
  #            S.East, S.West, Wales, Scotland, N.Ireland.
  enabled: true
  private_rent_index: 1.0  # 1.0 = frozen (no uprating). Reform: set >1.0 to unfreeze.
  rates_monthly:
    - [323.01,  428.86,  486.06,  566.12,  766.23]   # North East
    - [332.95,  457.44,  566.12,  657.60,  860.11]   # North West
    - [323.01,  451.72,  543.26,  600.41,  857.72]   # Yorkshire
    - [372.71,  486.06,  600.41,  686.18,  914.92]   # East Midlands
    - [390.10,  514.63,  629.03,  743.38,  972.12]   # West Midlands
    - [360.23,  629.03,  771.95,  886.35, 1252.29]   # East of England
    - [580.97, 1200.81, 1469.61, 1735.40, 2172.93]   # London
    - [392.58,  737.66,  914.92, 1086.46, 1543.90]   # South East
    - [390.10,  571.83,  737.66,  874.87, 1143.66]   # South West
    - [299.41,  419.92,  514.63,  566.12,  686.18]   # Wales
    - [323.01,  468.91,  543.26,  629.03,  886.35]   # Scotland
    - [273.42,  361.97,  428.86,  514.63,  566.12]   # Northern Ireland


labour_supply:
  # OBR labour supply elasticities (Slutsky decomposition).
  # Source: OBR (2023) "Costing a cut in National Insurance contributions:
  #   the impact on labour supply"
  #   https://obr.uk/docs/dlm_uploads/NICS-Cut-Impact-on-Labour-Supply-Note.pdf
  # Table A1 (substitution elasticities), Table A2 (income elasticities).
  # Elasticities default to ON; set enabled: false to suppress responses.
  enabled: true

  # Substitution elasticities (η_s): response to change in marginal net wage
  subst_married_women_no_children: 0.14
  subst_married_women_child_0_2: 0.301
  subst_married_women_child_3_4: 0.439   # highest — childcare constraint bites hardest
  subst_married_women_child_5_10: 0.173
  subst_married_women_child_11_plus: 0.160
  subst_lone_parents_child_0_4: 0.094
  subst_lone_parents_child_5_10: 0.128
  subst_lone_parents_child_11_18: 0.136
  subst_men_and_single_women: 0.15

  # Income elasticities (η_i): response to change in net income (typically ≤ 0)
  income_married_women_no_children: 0.0
  income_married_women_child_0_2: -0.185
  income_married_women_child_3_4: -0.173
  income_married_women_child_5_10: -0.102
  income_married_women_child_11_plus: -0.063
  income_lone_parents_child_0_4: -0.037
  income_lone_parents_child_5_10: -0.075
  income_lone_parents_child_11_18: -0.054
  income_men_and_single_women: -0.05

growth_factors:
  # OBR Economic and Fiscal Outlook, March 2026
  # Table 1.7 (Inflation) and Table 1.6 (Labour Market)
  cpi_rate: 0.03438        # 3.438% CPI inflation (FY 2025/26)
  gdp_deflator: 0.03239    # 3.239% GDP deflator
  earnings_growth: 0.04585  # 4.585% average weekly earnings growth
