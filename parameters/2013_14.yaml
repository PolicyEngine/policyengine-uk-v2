# UK Tax-Benefit Parameters for Fiscal Year 2013/14
# Sources: Finance Act 2013, SI 2013/574
# Major: Additional rate cut to 45%; HICBC fully in force; UC piloting begins; benefit cap introduced

fiscal_year: "2013/14"

income_tax:
  personal_allowance: 9440.0
  pa_taper_threshold: 100000.0
  pa_taper_rate: 0.5
  uk_brackets:
    - { rate: 0.20, threshold: 0.0 }
    - { rate: 0.40, threshold: 32010.0 }
    - { rate: 0.45, threshold: 150000.0 }  # Reduced from 50%
  scottish_brackets:
    - { rate: 0.20, threshold: 0.0 }
    - { rate: 0.40, threshold: 32010.0 }
    - { rate: 0.45, threshold: 150000.0 }
  dividend_allowance: 0.0
  dividend_basic_rate: 0.10
  dividend_higher_rate: 0.325
  dividend_additional_rate: 0.375   # Reduced from 42.5%
  savings_starter_rate_band: 2790.0

national_insurance:
  primary_threshold_annual: 7755.0   # £149/week
  upper_earnings_limit_annual: 41450.0  # £797/week
  main_rate: 0.12
  additional_rate: 0.02
  secondary_threshold_annual: 7696.0  # £148/week
  employer_rate: 0.138
  class2_flat_rate_weekly: 2.70
  class2_small_profits_threshold: 5725.0
  class4_lower_profits_limit: 7755.0
  class4_upper_profits_limit: 41450.0
  class4_main_rate: 0.09
  class4_additional_rate: 0.02

child_benefit:
  eldest_weekly: 20.30   # Frozen
  additional_weekly: 13.40  # Frozen
  hicbc_threshold: 50000.0   # HICBC fully in force from Jan 2013
  hicbc_taper_end: 60000.0

state_pension:
  new_state_pension_weekly: 0.0

pension_credit:
  standard_minimum_single: 145.40
  standard_minimum_couple: 222.05
  savings_credit_threshold_single: 115.30
  savings_credit_threshold_couple: 183.90

benefit_cap:
  # Benefit cap introduced April 2013: £500/week couples, £350/week singles
  # No London/non-London split until November 2016
  single_london: 18200.0           # £350/week annualised
  single_outside_london: 18200.0
  non_single_london: 26000.0       # £500/week annualised
  non_single_outside_london: 26000.0
  earnings_exemption_threshold: 7400.0  # Approx. annual earnings to be exempt

housing_benefit:
  withdrawal_rate: 0.65
  personal_allowance_single_under25: 56.80
  personal_allowance_single_25_plus: 71.70
  personal_allowance_couple: 112.55
  child_allowance: 65.62
  family_premium: 17.40

tax_credits:
  wtc_basic_element: 1920.0
  wtc_couple_element: 1970.0
  wtc_lone_parent_element: 1970.0
  wtc_30_hour_element: 790.0
  ctc_child_element: 2720.0
  ctc_family_element: 545.0
  ctc_disabled_child_element: 3015.0
  ctc_severely_disabled_child_element: 1220.0
  income_threshold: 6420.0
  taper_rate: 0.41
  wtc_min_hours_single: 30.0
  wtc_min_hours_couple: 24.0

scottish_child_payment:
  weekly_amount: 0.0
  max_age: 0.0

disability_premiums:
  disability_premium_single: 31.00
  disability_premium_couple: 44.20
  enhanced_disability_premium_single: 15.15
  enhanced_disability_premium_couple: 21.75
  severe_disability_premium: 59.50
  carer_premium: 33.30

income_related_benefits:
  esa_allowance_single_under25: 56.80
  esa_allowance_single_25_plus: 71.70
  esa_allowance_couple: 112.55
  esa_wrag_component: 28.75
  esa_support_component: 35.75
  jsa_allowance_single_under25: 56.80
  jsa_allowance_single_25_plus: 71.70
  jsa_allowance_couple: 112.55
  carers_allowance_weekly: 59.75
  ca_earnings_disregard_weekly: 100.0
  ca_min_hours_caring: 35.0
  ca_care_recipient_min_age: 16.0

universal_credit:
  # UC piloting from April 2013 (Pathfinder areas)
  standard_allowance_single_under25: 246.81
  standard_allowance_single_over25: 311.55
  standard_allowance_couple_under25: 387.42
  standard_allowance_couple_over25: 489.06
  child_element_first: 272.08
  child_element_subsequent: 226.67
  disabled_child_lower: 123.62
  disabled_child_higher: 352.92
  lcwra_element: 303.66
  carer_element: 144.70
  taper_rate: 0.65    # Original UC taper was 65%
  work_allowance_higher: 734.0
  work_allowance_lower: 423.0
  child_limit: 99   # No child limit before 2017/18

vat:
  standard_rate: 0.20
  reduced_rate: 0.05
  zero_rate: 0.0

growth_factors:
  # OBR Economic and Fiscal Outlook, March 2026; council tax: MHCLG council tax levels 2026-27, Table 3 (England average Band D)
  # Rates are the year-on-year change entering FY 2013/14.
  cpi_rate: 0.02600                   # +2.600% CPI inflation, EFO Table 1.7
  gdp_deflator: 0.01800               # +1.800% GDP deflator, EFO Table 1.7
  earnings_growth: 0.01200            # +1.200% average weekly earnings growth, EFO Table 1.6
  gdp_pc_growth: 0.03789              # +3.789% nominal GDP per 16+ head, EFO Tables 1.4 (quarterly) + 1.6
  mixed_income_pc_growth: 0.07346     # +7.346% mixed income per 16+ head, EFO Table 1.6
  savings_interest_growth: -0.19955   # -19.955% deposit rate growth, EFO Table 1.9
  mortgage_interest_growth: -0.02296  # -2.296% average mortgage rate growth, EFO Table 1.9
  rent_growth: 0.02178                # +2.178% actual rents for housing, EFO Table 1.7
  population_growth: 0.00729          # +0.729% 16+ population, EFO Table 1.6
  council_tax_growth: 0.00800         # +0.800% England average Band D, MHCLG Table 3

