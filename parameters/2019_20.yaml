growth_factors:
  # OBR Economic and Fiscal Outlook, March 2026; council tax: MHCLG council tax levels 2026-27, Table 3 (England average Band D)
  # Rates are the year-on-year change entering FY 2019/20.
  cpi_rate: 0.01800                   # +1.800% CPI inflation, EFO Table 1.7
  gdp_deflator: 0.01900               # +1.900% GDP deflator, EFO Table 1.7
  earnings_growth: 0.03700            # +3.700% average weekly earnings growth, EFO Table 1.6
  gdp_pc_growth: 0.02837              # +2.837% nominal GDP per 16+ head, EFO Tables 1.4 (quarterly) + 1.6
  mixed_income_pc_growth: 0.04199     # +4.199% mixed income per 16+ head, EFO Table 1.6
  savings_interest_growth: 0.02378    # +2.378% deposit rate growth, EFO Table 1.9
  mortgage_interest_growth: -0.03293  # -3.293% average mortgage rate growth, EFO Table 1.9
  rent_growth: 0.00755                # +0.755% actual rents for housing, EFO Table 1.7
  population_growth: 0.00506          # +0.506% 16+ population, EFO Table 1.6
  council_tax_growth: 0.04700         # +4.700% England average Band D, MHCLG Table 3

