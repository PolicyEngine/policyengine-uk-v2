# UK Tax-Benefit Parameters for Fiscal Year 2016/17
# Sources: Finance Act 2016, SI 2016/233
# Major: New State Pension introduced; dividend allowance; benefit cap reduced;
#        new dividend rates (7.5%/32.5%/38.1%)

fiscal_year: "2016/17"

income_tax:
  personal_allowance: 11000.0
  pa_taper_threshold: 100000.0
  pa_taper_rate: 0.5
  uk_brackets:
    - { rate: 0.20, threshold: 0.0 }
    - { rate: 0.40, threshold: 32000.0 }
    - { rate: 0.45, threshold: 150000.0 }
  scottish_brackets:  # Scotland still using UK rates in 2016/17
    - { rate: 0.20, threshold: 0.0 }
    - { rate: 0.40, threshold: 32000.0 }
    - { rate: 0.45, threshold: 150000.0 }
  dividend_allowance: 5000.0   # New dividend allowance introduced
  dividend_basic_rate: 0.075    # New rates from 2016/17
  dividend_higher_rate: 0.325
  dividend_additional_rate: 0.381
  savings_starter_rate_band: 5000.0

national_insurance:
  primary_threshold_annual: 8060.0   # £155/week
  upper_earnings_limit_annual: 43000.0  # £827/week
  main_rate: 0.12
  additional_rate: 0.02
  secondary_threshold_annual: 8112.0  # £156/week
  employer_rate: 0.138
  class2_flat_rate_weekly: 2.80
  class2_small_profits_threshold: 5965.0
  class4_lower_profits_limit: 8060.0
  class4_upper_profits_limit: 43000.0
  class4_main_rate: 0.09
  class4_additional_rate: 0.02

child_benefit:
  eldest_weekly: 20.70   # Frozen
  additional_weekly: 13.70  # Frozen
  hicbc_threshold: 50000.0
  hicbc_taper_end: 60000.0

state_pension:
  new_state_pension_weekly: 155.65  # New State Pension introduced April 2016

pension_credit:
  standard_minimum_single: 155.60
  standard_minimum_couple: 237.55
  savings_credit_threshold_single: 133.82
  savings_credit_threshold_couple: 212.97

benefit_cap:
  # Reduced from Nov 2016 with London/non-London split
  single_london: 15410.0
  single_outside_london: 13400.0
  non_single_london: 23000.0
  non_single_outside_london: 20000.0
  earnings_exemption_threshold: 7400.0

housing_benefit:
  withdrawal_rate: 0.65
  personal_allowance_single_under25: 57.90   # Benefits frozen
  personal_allowance_single_25_plus: 73.10
  personal_allowance_couple: 114.85
  child_allowance: 66.90
  family_premium: 17.45

tax_credits:
  wtc_basic_element: 1960.0   # Frozen (4-year freeze begins)
  wtc_couple_element: 2010.0
  wtc_lone_parent_element: 2010.0
  wtc_30_hour_element: 810.0
  ctc_child_element: 2780.0
  ctc_family_element: 545.0
  ctc_disabled_child_element: 3175.0
  ctc_severely_disabled_child_element: 1290.0
  income_threshold: 6420.0
  taper_rate: 0.41
  wtc_min_hours_single: 30.0
  wtc_min_hours_couple: 24.0

scottish_child_payment:
  weekly_amount: 0.0
  max_age: 0.0

disability_premiums:
  disability_premium_single: 32.25   # Frozen (exempt from 4-year freeze)
  disability_premium_couple: 45.95
  enhanced_disability_premium_single: 15.75
  enhanced_disability_premium_couple: 22.60
  severe_disability_premium: 61.85
  carer_premium: 34.60

income_related_benefits:
  esa_allowance_single_under25: 57.90   # Frozen
  esa_allowance_single_25_plus: 73.10
  esa_allowance_couple: 114.85
  esa_wrag_component: 29.05
  esa_support_component: 36.55
  jsa_allowance_single_under25: 57.90
  jsa_allowance_single_25_plus: 73.10
  jsa_allowance_couple: 114.85
  carers_allowance_weekly: 62.70
  ca_earnings_disregard_weekly: 110.0
  ca_min_hours_caring: 35.0
  ca_care_recipient_min_age: 16.0

universal_credit:
  standard_allowance_single_under25: 251.77   # Frozen
  standard_allowance_single_over25: 317.82
  standard_allowance_couple_under25: 395.20
  standard_allowance_couple_over25: 498.89
  child_element_first: 277.08
  child_element_subsequent: 231.67
  disabled_child_lower: 126.11
  disabled_child_higher: 359.58
  lcwra_element: 318.76
  carer_element: 150.39
  taper_rate: 0.65
  work_allowance_higher: 397.0   # Reduced from £734 (Autumn Statement 2015)
  work_allowance_lower: 192.0    # Reduced from £423
  child_limit: 99

vat:
  standard_rate: 0.20
  reduced_rate: 0.05
  zero_rate: 0.0

growth_factors:
  # OBR Economic and Fiscal Outlook, March 2026; council tax: MHCLG council tax levels 2026-27, Table 3 (England average Band D)
  # Rates are the year-on-year change entering FY 2016/17.
  cpi_rate: 0.01000                   # +1.000% CPI inflation, EFO Table 1.7
  gdp_deflator: 0.01800               # +1.800% GDP deflator, EFO Table 1.7
  earnings_growth: 0.02500            # +2.500% average weekly earnings growth, EFO Table 1.6
  gdp_pc_growth: 0.03554              # +3.554% nominal GDP per 16+ head, EFO Tables 1.4 (quarterly) + 1.6
  mixed_income_pc_growth: 0.01904     # +1.904% mixed income per 16+ head, EFO Table 1.6
  savings_interest_growth: -0.27926   # -27.926% deposit rate growth, EFO Table 1.9
  mortgage_interest_growth: -0.08963  # -8.963% average mortgage rate growth, EFO Table 1.9
  rent_growth: 0.01331                # +1.331% actual rents for housing, EFO Table 1.7
  population_growth: 0.00705          # +0.705% 16+ population, EFO Table 1.6
  council_tax_growth: 0.03100         # +3.100% England average Band D, MHCLG Table 3

lha:
