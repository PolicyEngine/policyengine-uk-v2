  # DWP UC LHA rates by BRMA (April 2016), aggregated to region
  # weighted by VOA list-of-rents observation counts. NI approximated from
  # the 2019-20 NI list of rents scaled by the GB cash path.
  # Categories: [A=shared, B=1-bed, C=2-bed, D=3-bed, E=4+bed].
  enabled: true
  private_rent_index: 1.0
  rates_monthly:
    - [  250.22,   361.81,   415.72,   469.80,   629.00]   # North East
    - [  261.21,   397.35,   468.44,   540.51,   717.73]   # North West
    - [  261.61,   378.38,   454.60,   507.65,   712.72]   # Yorkshire
    - [  262.09,   374.71,   463.35,   525.00,   689.74]   # East Midlands
    - [  283.57,   407.09,   500.13,   570.48,   766.07]   # West Midlands
    - [  269.79,   496.09,   601.70,   690.05,   943.30]   # East of England
    - [  399.33,   936.06,  1133.13,  1347.34,  1655.57]   # London
    - [  316.25,   568.16,   715.73,   853.64,  1217.39]   # South East
    - [  295.05,   470.67,   589.49,   697.89,   946.36]   # South West
    - [  248.94,   360.77,   445.82,   496.87,   640.72]   # Wales
    - [  272.14,   434.74,   500.90,   605.98,   783.15]   # Scotland
    - [  201.50,   276.66,   327.98,   388.10,   418.85]   # Northern Ireland
