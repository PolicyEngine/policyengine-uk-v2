# UK Tax-Benefit Parameters for Fiscal Year 2023/24
# Sources: UK legislation via Lex API (legislation.gov.uk)

fiscal_year: "2023/24"

income_tax:
  personal_allowance: 12570.0         # ITA 2007 s.35 (frozen)
  pa_taper_threshold: 100000.0
  pa_taper_rate: 0.5
  uk_brackets:
    - { rate: 0.20, threshold: 0.0 }
    - { rate: 0.40, threshold: 37700.0 }
    - { rate: 0.45, threshold: 125140.0 }  # Additional rate threshold reduced from £150k
  scottish_brackets:
    - { rate: 0.19, threshold: 0.0 }       # Starter
    - { rate: 0.20, threshold: 2162.0 }    # Basic
    - { rate: 0.21, threshold: 13118.0 }   # Intermediate
    - { rate: 0.42, threshold: 31092.0 }   # Higher
    - { rate: 0.47, threshold: 125140.0 }  # Top (no advanced rate in 2023/24)
  dividend_allowance: 1000.0   # Reduced from £2k to £1k for 2023/24
  dividend_basic_rate: 0.0875
  dividend_higher_rate: 0.3375
  dividend_additional_rate: 0.3935
  savings_starter_rate_band: 5000.0

national_insurance:
  primary_threshold_annual: 12570.0
  upper_earnings_limit_annual: 50270.0
  # NI (Reduction in Rates) Act 2023: main rate cut from 12% to 10% from 6 Jan 2024.
  # Blended annual rate: (12% × 9/12) + (10% × 3/12) = 11.5%
  main_rate: 0.115
  additional_rate: 0.02
  secondary_threshold_annual: 9100.0
  employer_rate: 0.138
  # Class 2 (self-employed flat rate): £3.45/week (SSCBA 1992 s.11, SI 2023/319)
  class2_flat_rate_weekly: 3.45
  class2_small_profits_threshold: 6725.0
  class4_lower_profits_limit: 12570.0
  class4_upper_profits_limit: 50270.0
  class4_main_rate: 0.09
  class4_additional_rate: 0.02

universal_credit:
  # SI 2023/233 (Up-rating Order 2023), amending UC Regs 2013 reg.36
  standard_allowance_single_under25: 292.11
  standard_allowance_single_over25: 368.74
  standard_allowance_couple_under25: 458.51
  standard_allowance_couple_over25: 578.82
  child_element_first: 315.00
  child_element_subsequent: 269.58
  disabled_child_lower: 146.31
  disabled_child_higher: 456.89
  lcwra_element: 390.06
  carer_element: 185.86
  taper_rate: 0.55
  work_allowance_higher: 631.0
  work_allowance_lower: 379.0
  child_limit: 2

child_benefit:
  # SI 2023/237 — Child Benefit (Rates) Regs as amended
  eldest_weekly: 24.00
  additional_weekly: 15.90
  hicbc_threshold: 50000.0   # £50k threshold for 2023/24
  hicbc_taper_end: 60000.0   # Full clawback at £60k

state_pension:
  # SI 2023/234 art.6: £203.85/week
  new_state_pension_weekly: 203.85

pension_credit:
  standard_minimum_single: 201.05
  standard_minimum_couple: 306.85
  savings_credit_threshold_single: 174.49
  savings_credit_threshold_couple: 277.12

benefit_cap:
  single_london: 15410.0
  single_outside_london: 13400.0
  non_single_london: 23000.0
  non_single_outside_london: 20000.0
  earnings_exemption_threshold: 7400.0

housing_benefit:
  withdrawal_rate: 0.65
  personal_allowance_single_under25: 67.25
  personal_allowance_single_25_plus: 84.80
  personal_allowance_couple: 133.30
  child_allowance: 77.78
  family_premium: 17.85

tax_credits:
  wtc_basic_element: 2280.0
  wtc_couple_element: 2340.0
  wtc_lone_parent_element: 2340.0
  wtc_30_hour_element: 950.0
  ctc_child_element: 3235.0
  ctc_family_element: 545.0
  ctc_disabled_child_element: 3905.0
  ctc_severely_disabled_child_element: 1575.0
  income_threshold: 7455.0
  taper_rate: 0.41
  wtc_min_hours_single: 30.0
  wtc_min_hours_couple: 24.0


scottish_child_payment:
  weekly_amount: 25.00
  max_age: 16.0

disability_premiums:
  # Income Support (General) Regs 1987 (SI 1987/1967) Sch.2; uprated by SI 2023/285 art.14
  disability_premium_single: 39.85
  disability_premium_couple: 56.80
  enhanced_disability_premium_single: 26.65
  enhanced_disability_premium_couple: 38.00
  severe_disability_premium: 76.40
  carer_premium: 43.25

income_related_benefits:
  # ESA: SI 2008/794 Sch.4; uprated by SI 2023/285 art.18
  esa_allowance_single_under25: 67.20
  esa_allowance_single_25_plus: 84.80
  esa_allowance_couple: 133.30
  esa_wrag_component: 33.70
  esa_support_component: 45.94
  # JSA: SI 1996/207 Sch.1; uprated by SI 2023/285 art.16
  jsa_allowance_single_under25: 67.20
  jsa_allowance_single_25_plus: 84.80
  jsa_allowance_couple: 133.30
  # CA: SSCBA 1992 s.70; uprated by SI 2023/285 art.12: £76.75/week
  carers_allowance_weekly: 76.75
  ca_earnings_disregard_weekly: 139.00
  ca_min_hours_caring: 35.0
  ca_care_recipient_min_age: 16.0

vat:
  standard_rate: 0.20
  reduced_rate: 0.05
  zero_rate: 0.0

# DWP cost of living payments, FY 2023-24: £301 (Apr 2023) + £300 (Oct 2023)
# + £299 (Feb 2024) per means-tested claim; £150 per disability benefit
# recipient (Jun 2023). Social Security (Additional Payments) Act 2023.
# Source: https://www.gov.uk/guidance/cost-of-living-payment
cost_of_living:
  means_tested: 900.0
  disability: 150.0

growth_factors:
  # OBR Economic and Fiscal Outlook, March 2026; council tax: MHCLG council tax levels 2026-27, Table 3 (England average Band D)
  # Rates are the year-on-year change entering FY 2023/24.
  cpi_rate: 0.05670                  # +5.670% CPI inflation, EFO Table 1.7
  gdp_deflator: 0.05298              # +5.298% GDP deflator, EFO Table 1.7
  earnings_growth: 0.05661           # +5.661% average weekly earnings growth, EFO Table 1.6
  gdp_pc_growth: 0.04664             # +4.664% nominal GDP per 16+ head, EFO Tables 1.4 (quarterly) + 1.6
  mixed_income_pc_growth: 0.00018    # +0.018% mixed income per 16+ head, EFO Table 1.6
  savings_interest_growth: 2.31864   # +231.864% deposit rate growth, EFO Table 1.9
  mortgage_interest_growth: 0.36029  # +36.029% average mortgage rate growth, EFO Table 1.9
  rent_growth: 0.06293               # +6.293% actual rents for housing, EFO Table 1.7
  population_growth: 0.01192         # +1.192% 16+ population, EFO Table 1.6
  council_tax_growth: 0.05100        # +5.100% England average Band D, MHCLG Table 3

lha:
  # Local Housing Allowance rates for 2023/24 (calendar monthly, £).
  # DWP UC LHA rates by BRMA (April 2023), aggregated to region
  # weighted by VOA list-of-rents observation counts. NI approximated from
  # the 2019-20 NI list of rents scaled by the GB cash path.
  # Categories: [A=shared, B=1-bed, C=2-bed, D=3-bed, E=4+bed].
  enabled: true
  private_rent_index: 1.0
  rates_monthly:
    - [  291.55,   377.85,   429.79,   496.76,   691.44]   # North East
    - [  294.77,   447.08,   513.68,   591.27,   813.53]   # North West
    - [  291.37,   424.86,   499.30,   555.67,   794.86]   # Yorkshire
    - [  327.80,   442.52,   545.59,   624.70,   828.16]   # East Midlands
    - [  336.63,   467.76,   570.60,   662.06,   883.43]   # West Midlands
    - [  316.67,   609.17,   735.10,   857.92,  1150.97]   # East of England
    - [  523.87,  1125.32,  1365.71,  1642.13,  2109.78]   # London
    - [  360.60,   670.06,   840.38,  1022.05,  1403.46]   # South East
    - [  348.98,   545.81,   672.61,   801.42,  1118.22]   # South West
    - [  283.95,   392.42,   490.86,   522.21,   696.18]   # Wales
    - [  315.80,   466.79,   507.23,   670.78,   943.23]   # Scotland
    - [  238.42,   318.47,   373.97,   448.76,   493.60]   # Northern Ireland
