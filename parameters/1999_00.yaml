# UK Tax-Benefit Parameters for Fiscal Year 1999/00
# Sources: Finance Act 1998, SI 1999/264, HMRC Table A.1/A.2/A.4

fiscal_year: "1999/00"

income_tax:
  personal_allowance: 4335.0
  pa_taper_threshold: 100000000.0  # No PA taper before 2010/11
  pa_taper_rate: 0.0
  uk_brackets:
    - { rate: 0.10, threshold: 0.0 }
    - { rate: 0.23, threshold: 1500.0 }
    - { rate: 0.40, threshold: 28000.0 }
  scottish_brackets:  # Scotland used UK rates until 2017/18
    - { rate: 0.10, threshold: 0.0 }
    - { rate: 0.23, threshold: 1500.0 }
    - { rate: 0.40, threshold: 28000.0 }
  dividend_allowance: 0.0  # Did not exist before 2016/17
  dividend_basic_rate: 0.1
  dividend_higher_rate: 0.325
  dividend_additional_rate: 0.0
  savings_starter_rate_band: 0.0  # Did not exist before 2015/16

national_insurance:
  primary_threshold_annual: 3432.0   # 66/week
  upper_earnings_limit_annual: 26000.0  # 500/week
  main_rate: 0.1
  additional_rate: 0.0  # No additional rate above UEL until 2003/04
  secondary_threshold_annual: 4316.0   # 83/week
  employer_rate: 0.122
  class2_flat_rate_weekly: 6.55
  class2_small_profits_threshold: 3770.0
  class4_lower_profits_limit: 7530.0
  class4_upper_profits_limit: 26000.0
  class4_main_rate: 0.06
  class4_additional_rate: 0.0

universal_credit:  # Did not exist until 2013/14
  standard_allowance_single_under25: 0.0
  standard_allowance_single_over25: 0.0
  standard_allowance_couple_under25: 0.0
  standard_allowance_couple_over25: 0.0
  child_element_first: 0.0
  child_element_subsequent: 0.0
  disabled_child_lower: 0.0
  disabled_child_higher: 0.0
  lcwra_element: 0.0
  carer_element: 0.0
  taper_rate: 0.0
  work_allowance_higher: 0.0
  work_allowance_lower: 0.0
  child_limit: 0

child_benefit:
  eldest_weekly: 14.4
  additional_weekly: 9.6
  hicbc_threshold: 999999.0  # HICBC did not exist before 2013/14
  hicbc_taper_end: 999999.0

state_pension:
  new_state_pension_weekly: 0.0  # Did not exist until 2016/17

pension_credit:  # Did not exist until 2003/04 (MIG predecessor not modelled)
  standard_minimum_single: 0.0
  standard_minimum_couple: 0.0
  savings_credit_threshold_single: 0.0
  savings_credit_threshold_couple: 0.0

benefit_cap:  # Did not exist until 2013/14
  single_london: 0.0
  single_outside_london: 0.0
  non_single_london: 0.0
  non_single_outside_london: 0.0
  earnings_exemption_threshold: 0.0

housing_benefit:
  withdrawal_rate: 0.65
  personal_allowance_single_under25: 40.7
  personal_allowance_single_25_plus: 51.4
  personal_allowance_couple: 80.65
  child_allowance: 20.2
  family_premium: 11.05

tax_credits:
  # WFTC from Oct 1999 (SI 1999/2487 amending SI 1987/1973; SI 1999/264 Sch.2)
  # WFTC taper rate: 55% (SI 1999/2487 s.2(10)); applicable amount: reg 47; min 16 hrs/wk
  wtc_basic_element: 2719.60       # Adult credit: £52.30/wk × 52 (SI 1999/2487 s.2(13)(b))
  wtc_couple_element: 0.0          # No separate couple element in WFTC
  wtc_lone_parent_element: 0.0     # No separate lone parent element in WFTC
  wtc_30_hour_element: 574.60      # 30-hour element: £11.05/wk × 52 (SI 1999/264 Sch.2 item 1A)
  ctc_child_element: 1032.20       # Child under 11: £19.85/wk × 52 (SI 1999/2487 s.2(13)(c))
  ctc_family_element: 0.0          # Family element did not exist in WFTC
  ctc_disabled_child_element: 0.0  # Disabled child element not introduced until 2001/02
  ctc_severely_disabled_child_element: 0.0
  income_threshold: 4680.00        # Applicable amount: £90.00/wk × 52 (SI 1999/2487 s.2(9))
  taper_rate: 0.55                 # WFTC taper rate: 55%
  wtc_min_hours_single: 16.0       # WFTC required 16 hours/wk
  wtc_min_hours_couple: 16.0

scottish_child_payment:  # Did not exist until 2021/22
  weekly_amount: 0.0
  max_age: 0.0

disability_premiums:
  # IS (General) Regs 1987 Sch.2 Pt.IV; uprated by SI 1999 uprating order
  disability_premium_single: 21.9
  disability_premium_couple: 31.25
  enhanced_disability_premium_single: 0.0  # Introduced April 2001
  enhanced_disability_premium_couple: 0.0
  severe_disability_premium: 39.75
  carer_premium: 13.95

income_related_benefits:
  esa_allowance_single_under25: 0.0  # ESA did not exist until 2008/09
  esa_allowance_single_25_plus: 0.0
  esa_allowance_couple: 0.0
  esa_wrag_component: 0.0
  esa_support_component: 0.0
  jsa_allowance_single_under25: 40.7
  jsa_allowance_single_25_plus: 51.4
  jsa_allowance_couple: 80.65
  carers_allowance_weekly: 39.95
  ca_earnings_disregard_weekly: 50.0
  ca_min_hours_caring: 35.0
  ca_care_recipient_min_age: 16.0

vat:
  standard_rate: 0.175
  reduced_rate: 0.05
  zero_rate: 0.0

growth_factors:
  cpi_rate: 0.0
  gdp_deflator: 0.0
  earnings_growth: 0.0
