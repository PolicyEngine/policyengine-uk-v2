    - [  390.19,   562.61,   661.23,   773.96,  1048.08]   # West Midlands
    - [  419.08,   707.61,   849.02,   986.01,  1321.15]   # East of England
    - [  639.79,  1257.73,  1520.60,  1826.45,  2408.17]   # London
    - [  448.49,   772.54,   972.35,  1188.25,  1605.89]   # South East
    - [  430.61,   648.32,   795.99,   950.53,  1377.27]   # South West
    - [  343.55,   465.81,   572.27,   598.79,   869.84]   # Wales
    - [  369.66,   522.39,   589.70,   801.83,  1098.05]   # Scotland
