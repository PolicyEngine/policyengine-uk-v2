# UK Tax-Benefit Parameters for Fiscal Year 2026/27
# Projected using OBR March 2026 CPI forecasts applied to 2025/26 base values.
# Income tax thresholds assumed frozen per current government policy.
# Benefits uprated by September 2025 CPI (OBR forecast: ~3.4%).

fiscal_year: "2026/27"

income_tax:
  personal_allowance: 12570.0         # Frozen (Finance Act 2021 s.5)
  pa_taper_threshold: 100000.0
  pa_taper_rate: 0.5
  uk_brackets:
    - { rate: 0.20, threshold: 0.0 }
    - { rate: 0.40, threshold: 37700.0 }  # Frozen
    - { rate: 0.45, threshold: 125140.0 }
  # Scottish Budget 2025-26 announced freeze through 2026/27
  scottish_brackets:
    - { rate: 0.19, threshold: 0.0 }
    - { rate: 0.20, threshold: 2827.0 }
    - { rate: 0.21, threshold: 14921.0 }
    - { rate: 0.42, threshold: 31092.0 }
    - { rate: 0.45, threshold: 62430.0 }
    - { rate: 0.48, threshold: 125140.0 }
  dividend_allowance: 500.0
  dividend_basic_rate: 0.0875
  dividend_higher_rate: 0.3375
  dividend_additional_rate: 0.3935
  savings_starter_rate_band: 5000.0

national_insurance:
  primary_threshold_annual: 12570.0
  upper_earnings_limit_annual: 50270.0
  main_rate: 0.08
  additional_rate: 0.02
  secondary_threshold_annual: 5000.0
  employer_rate: 0.15
  class4_lower_profits_limit: 12570.0
  class4_upper_profits_limit: 50270.0
  class4_main_rate: 0.06
  class4_additional_rate: 0.02

universal_credit:
  # Projected: 2025/26 amounts uprated by ~3.4% CPI
  standard_allowance_single_under25: 327.76
  standard_allowance_single_over25: 413.75
  standard_allowance_couple_under25: 514.46
  standard_allowance_couple_over25: 649.46
  child_element_first: 350.53
  child_element_subsequent: 302.77
  disabled_child_lower: 164.16
  disabled_child_higher: 512.73
  lcwra_element: 437.66
  carer_element: 208.54
  taper_rate: 0.55
  work_allowance_higher: 707.0
  work_allowance_lower: 425.0
  child_limit: 99  # Two-child limit repealed from April 2026 (Budget 2025)

child_benefit:
  eldest_weekly: 26.94    # Uprated by CPI
  additional_weekly: 17.84
  hicbc_threshold: 60000.0
  hicbc_taper_end: 80000.0

state_pension:
  # Triple lock: higher of CPI, earnings, or 2.5%
  # OBR forecast earnings growth 4.6% > CPI 3.4% > 2.5%, so earnings used
  new_state_pension_weekly: 240.81  # £230.25 × 1.0459

pension_credit:
  standard_minimum_single: 237.52
  standard_minimum_couple: 362.52
  savings_credit_threshold_single: 207.37
  savings_credit_threshold_couple: 328.78

benefit_cap:
  single_london: 15410.0
  single_outside_london: 13400.0
  non_single_london: 23000.0
  non_single_outside_london: 20000.0
  earnings_exemption_threshold: 10152.0

housing_benefit:
  withdrawal_rate: 0.65
  personal_allowance_single_under25: 71.70
  personal_allowance_single_25_plus: 90.50
  personal_allowance_couple: 142.25
  child_allowance: 83.73
  family_premium: 18.53

tax_credits:
  wtc_basic_element: 2435.0
  wtc_couple_element: 2500.0
  wtc_lone_parent_element: 2500.0
  wtc_30_hour_element: 1015.0
  ctc_child_element: 3455.0
  ctc_family_element: 545.0
  ctc_disabled_child_element: 4170.0
  ctc_severely_disabled_child_element: 1680.0
  income_threshold: 7455.0
  taper_rate: 0.41
  wtc_min_hours_single: 30.0
  wtc_min_hours_couple: 24.0


scottish_child_payment:
  weekly_amount: 26.70
  max_age: 16.0

disability_premiums:
  # SI 1987/1967 Sch.2; uprated from 2025/26 by CPI 2.015% (OBR March 2026)
  disability_premium_single: 43.36
  disability_premium_couple: 61.82
  enhanced_disability_premium_single: 28.46
  enhanced_disability_premium_couple: 40.65
  severe_disability_premium: 83.14
  carer_premium: 46.93

income_related_benefits:
  # ESA: SI 2008/794 Sch.4; uprated from 2025/26 by CPI 2.015%
  esa_allowance_single_under25: 73.14
  esa_allowance_single_25_plus: 92.32
  esa_allowance_couple: 145.12
  esa_wrag_component: 36.67
  esa_support_component: 49.94
  # JSA: SI 1996/207 Sch.1; uprated from 2025/26 by CPI 2.015%
  jsa_allowance_single_under25: 73.14
  jsa_allowance_single_25_plus: 92.32
  jsa_allowance_couple: 145.12
  # CA: SSCBA 1992 s.70; uprated from 2025/26 by CPI 2.015%
  carers_allowance_weekly: 83.55
  ca_earnings_disregard_weekly: 154.04
  ca_min_hours_caring: 35.0
  ca_care_recipient_min_age: 16.0

vat:
  standard_rate: 0.20
  reduced_rate: 0.05
  zero_rate: 0.0

growth_factors:
  # OBR Economic and Fiscal Outlook, March 2026; council tax: MHCLG council tax levels 2026-27, Table 3 (England average Band D)
  # Rates are the year-on-year change entering FY 2026/27.
  cpi_rate: 0.02015                  # +2.015% CPI inflation, EFO Table 1.7
  gdp_deflator: 0.02006              # +2.006% GDP deflator, EFO Table 1.7
  earnings_growth: 0.03172           # +3.172% average weekly earnings growth, EFO Table 1.6
  gdp_pc_growth: 0.02928             # +2.928% nominal GDP per 16+ head, EFO Tables 1.4 (quarterly) + 1.6
  mixed_income_pc_growth: 0.03307    # +3.307% mixed income per 16+ head, EFO Table 1.6
  savings_interest_growth: -0.09668  # -9.668% deposit rate growth, EFO Table 1.9
  mortgage_interest_growth: 0.06747  # +6.747% average mortgage rate growth, EFO Table 1.9
  rent_growth: 0.03342               # +3.342% actual rents for housing, EFO Table 1.7
  population_growth: 0.00635         # +0.635% 16+ population, EFO Table 1.6
  council_tax_growth: 0.04900        # +4.900% England average Band D, MHCLG Table 3

lha:
