  # Categories: [A=shared, B=1-bed, C=2-bed, D=3-bed, E=4+bed].
  enabled: true
  private_rent_index: 1.0
  rates_monthly:
    - [  337.82,   426.38,   478.43,   553.03,   767.50]   # North East
    - [  347.29,   537.98,   617.04,   703.03,  1005.70]   # North West
