name: Axiom artifact drift

# The compiled artifacts in src/axiom/artifacts/ are snapshots of rulespec-uk.
# This job regenerates them against upstream HEAD weekly (and on demand): if
# the rules have improved upstream, the regenerated artifacts differ and the
# job fails, prompting a refresh PR. The engine is built at the rev pinned in
# Cargo.toml so the compiled artifacts always match what the crate runs.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Clone sibling repos
        run: |
          ENGINE_REV=$(grep -o 'axiom-rules-engine.*rev = "[0-9a-f]*"' Cargo.toml | grep -o '[0-9a-f]\{40\}')
          echo "engine rev: $ENGINE_REV"
          cd ..
          git clone --depth 1 https://github.com/TheAxiomFoundation/rulespec-uk
          git clone --depth 1 https://github.com/TheAxiomFoundation/axiom-compose
          git clone --depth 1 https://github.com/TheAxiomFoundation/axiom-programs
          git clone https://github.com/TheAxiomFoundation/axiom-rules-engine
          git -C axiom-rules-engine checkout "$ENGINE_REV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Regenerate artifacts and run tests
        run: bash scripts/refresh_artifacts.sh

      - name: Fail on drift
        run: |
          if ! git diff --quiet src/axiom/artifacts/; then
            echo "::error::Artifacts are stale: rulespec-uk HEAD compiles to different artifacts."
            echo "Tests passed against the regenerated artifacts, so the refresh is safe:"
            echo "run scripts/refresh_artifacts.sh locally and commit the result."
            echo "(If the previous step failed instead, upstream behaviour changed — investigate"
            echo "before refreshing.)"
            git diff --stat src/axiom/artifacts/
            exit 1
          fi
          echo "Artifacts are up to date with rulespec-uk HEAD."
