name: Publish to PyPI

on:
  workflow_call:

permissions:
  contents: write

jobs:
  build-wheels:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            wheel_platform: manylinux2014_x86_64.manylinux_2_17_x86_64
            container: quay.io/pypa/manylinux_2_28_x86_64
            macos_deployment_target: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            wheel_platform: manylinux2014_aarch64.manylinux_2_17_aarch64
            container: quay.io/pypa/manylinux_2_28_aarch64
            macos_deployment_target: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            wheel_platform: macosx_10_13_x86_64
            container: ""
            macos_deployment_target: "10.13"
          - os: macos-15
            target: aarch64-apple-darwin
            wheel_platform: macosx_11_0_arm64
            container: ""
            macos_deployment_target: "11.0"

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Install Rust (container)
        if: matrix.container != ''
        run: |
          export HOME=/root
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "/root/.cargo/bin" >> $GITHUB_PATH
          echo "RUSTUP_HOME=/root/.rustup" >> $GITHUB_ENV
          echo "CARGO_HOME=/root/.cargo" >> $GITHUB_ENV

      - name: Install Rust (native)
        if: matrix.container == ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Rust binary
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Set up Python
        if: matrix.container == ''
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Python (container)
        if: matrix.container != ''
        run: |
          # Use the manylinux container's bundled CPython 3.12
          PYBIN=$(ls -d /opt/python/cp312-cp312/bin 2>/dev/null || ls -d /opt/python/cp31*/bin | head -1)
          echo "$PYBIN" >> $GITHUB_PATH

      - name: Install build tools
        run: |
          pip install build wheel

      - name: Stage binary and parameters into package
        run: |
          mkdir -p interfaces/python/policyengine_uk_compiled/bin
          cp target/${{ matrix.target }}/release/policyengine-uk-rust interfaces/python/policyengine_uk_compiled/bin/
          chmod +x interfaces/python/policyengine_uk_compiled/bin/policyengine-uk-rust
          cp -r parameters interfaces/python/policyengine_uk_compiled/parameters

      - name: Build wheel
        run: python -m build --wheel

      - name: Retag wheel platform
        run: |
          python -m wheel tags --remove --platform-tag "${{ matrix.wheel_platform }}" dist/*.whl
          ls -la dist/

      - name: Validate wheel artifact
        run: |
          python scripts/validate_wheel_artifact.py \
            --target "${{ matrix.target }}" \
            --wheel-platform "${{ matrix.wheel_platform }}"

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Publish git tag
        run: bash .github/publish-git-tag.sh

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI }}
          packages-dir: dist/
          skip-existing: true
