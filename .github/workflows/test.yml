name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python wrapper test dependencies
        run: pip install pandas pydantic pytest

      - name: Test Python wrapper
        run: PYTHONPATH=interfaces/python pytest interfaces/python/tests -q

      - name: Parity (Rust ↔ Python FRS microdata; fails on divergence)
        # Real divergence beyond tolerance fails CI (exit 1). If the FRS data is
        # absent (as it is on CI runners), the harness prints a loud
        # "FRS data unavailable — SKIPPING" message and exits 0 — a skip, NOT a
        # pass. There is no --no-fail flag.
        run: PYTHONPATH=interfaces/python python scripts/parity.py
