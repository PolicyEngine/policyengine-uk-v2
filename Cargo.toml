[package]
name = "policyengine-uk-rust"
version = "0.1.0"
edition = "2021"
description = "A high-performance UK tax-benefit microsimulation engine in Rust"

[dependencies]
rayon = "1.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
csv = "1.3"
clap = { version = "4", features = ["derive"] }
indicatif = "0.17"
comfy-table = "7"
colored = "2"
anyhow = "1"
smartcore = "0.4"
rand = "0.8"

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "branch"
harness = false

[[bench]]
name = "parameter_tree"
harness = false

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
