# Council tax band & single-person discount.
#
# 2025/26 England average Band D = £2,280 (DLUHC Council Tax levels statistics).
# Band multipliers: A=6/9, B=7/9, C=8/9, D=1, E=11/9, F=13/9, G=15/9, H=18/9.
# Single-person discount: 25% (Local Government Finance Act 1992 s.11(1)(a))
# applied when exactly one resident is aged 18+.

- name: Band D, two adults — full council tax
  period: 2025
  absolute_error_margin: 1
  input:
    people:
      p1: { age: 35, employment_income: 0 }
      p2: { age: 33, employment_income: 0 }
    benunits:
      b: { members: [p1, p2] }
    households:
      h: { members: [p1, p2], region: London, main_residence_value: 80_000 }
  output:
    baseline_council_tax_calculated: 2280

- name: Band D, single adult — 25% discount applies
  period: 2025
  absolute_error_margin: 1
  input:
    people:
      p: { age: 35, employment_income: 0 }
    benunits:
      b: { members: [p] }
    households:
      h: { members: [p], region: London, main_residence_value: 80_000 }
  output:
    # £2,280 × 0.75 = £1,710
    baseline_council_tax_calculated: 1710

- name: Band A, single adult
  period: 2025
  absolute_error_margin: 1
  input:
    people:
      p: { age: 40, employment_income: 0 }
    benunits:
      b: { members: [p] }
    households:
      h: { members: [p], region: London, main_residence_value: 30_000 }
  output:
    # Band A multiplier = 6/9 → £2,280 × 6/9 = £1,520; ×0.75 = £1,140
    baseline_council_tax_calculated: 1140

- name: Band D, adult with two children — full rate (children don't count)
  period: 2025
  absolute_error_margin: 1
  input:
    people:
      p1: { age: 35, employment_income: 0 }
      c1: { age: 8 }
      c2: { age: 4 }
    benunits:
      b: { members: [p1, c1, c2] }
    households:
      h: { members: [p1, c1, c2], region: London, main_residence_value: 80_000 }
  output:
    # Single adult → 25% discount: £2,280 × 0.75 = £1,710
    baseline_council_tax_calculated: 1710
