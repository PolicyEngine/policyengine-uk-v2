# Baseline income-tax cases for the Rust engine.
# Numbers verified against the engine on 2026-04-30 at year=2025.

- name: Zero income — no tax
  period: 2025
  absolute_error_margin: 0
  input:
    employment_income: 0
  output:
    income_tax: 0

- name: Below personal allowance — no tax
  period: 2025
  absolute_error_margin: 0
  input:
    employment_income: 12_000
  output:
    income_tax: 0

- name: Basic-rate band only
  period: 2025
  absolute_error_margin: 1
  input:
    employment_income: 25_000
  output:
    income_tax: 2486

- name: Spans basic and higher rates
  period: 2025
  absolute_error_margin: 1
  input:
    employment_income: 50_000
  output:
    income_tax: 7486

- name: Personal allowance fully tapered
  period: 2025
  absolute_error_margin: 1
  input:
    employment_income: 150_000
  output:
    income_tax: 53703
